<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TimeEcho 网页端</title><link rel="stylesheet" href="/static/webapp.css"></head><body><main class="shell">
<header class="top"><div class="brand"><img src="/static/assets/timeecho-app-icon.png">TimeEcho 网页端</div><nav class="nav" id="nav"><button data-page="home" class="active">首页</button><button data-page="write">写纸飞机</button><button data-page="mine">我的纸飞机</button><button data-page="salvage">打捞</button><button data-page="emotion">情绪小结</button><button id="logout">退出</button></nav></header>
<section id="login" class="card" style="max-width:520px;margin:70px auto"><h1>进入时光树洞</h1><p class="muted">网页端与 Android 使用同一套匿名 API。</p><label>手机号</label><input id="phone" value="13800000001"><label>城市</label><input id="city" value="上海"><label>验证码</label><div class="row"><input id="code" value="123456"><button class="ghost" id="sendCode">发送</button></div><button class="primary" id="loginBtn" style="width:100%;margin-top:16px">进入树洞</button><div id="loginMsg"></div></section>
<section id="workspace" class="hidden">
<div data-view="home" class="view grid"><div class="card span8"><h1 id="welcome">晚上好</h1><p class="muted">这里没有关注和粉丝，只有被时间温柔处理的纸飞机。</p><button class="primary jump" data-page="write">写一封纸飞机</button></div><div class="card span4"><img class="icon-strip" src="/static/assets/timeecho-icon-set.png"></div></div>
<div data-view="write" class="view hidden card"><h2>写纸飞机</h2><label>内容</label><textarea id="content" placeholder="写下此刻想说的话…"></textarea><div class="grid"><div class="span4"><label>情绪</label><select id="emotion"><option>平静</option><option>疲惫</option><option>焦虑</option><option>孤独</option><option>期待</option></select></div><div class="span4"><label>封存天数</label><select id="sealDays"><option value="1">1 天</option><option value="7">7 天</option><option value="30">30 天</option></select></div><div class="span4"><label>城市</label><input id="letterCity" value="上海"></div></div><button id="createLetter" class="primary">封存纸飞机</button><div id="writeMsg"></div></div>
<div data-view="mine" class="view hidden card"><h2>我的纸飞机</h2><button id="loadMine" class="ghost">刷新</button><div id="mineList"></div></div>
<div data-view="salvage" class="view hidden card"><h2>打捞纸飞机</h2><p class="muted">每次只遇见一封陌生人的信。</p><button id="salvageBtn" class="primary">开始打捞</button><div id="salvageResult"></div></div>
<div data-view="emotion" class="view hidden card"><h2>情绪小结</h2><button id="emotionBtn" class="ghost">生成小结</button><div id="emotionResult"></div></div>
</section></main><script src="/static/app.js"></script></body></html>
