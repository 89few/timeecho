name: timeecho_mobile
description: TimeEcho / 时光树洞 Flutter Android client.
publish_to: 'none'
version: 1.5.0+9

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.4
  web_socket_channel: ^3.0.1
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  image_picker: ^1.2.3
  record: ^7.1.1
  path_provider: ^2.1.5
  audioplayers: ^6.8.1
  cached_network_image: ^3.4.1
  video_player: ^2.10.1
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/avatars/
